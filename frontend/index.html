<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIO Invest | Alpha Strategic Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #050505; color: #D4AF37; overflow-x: hidden; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #8A6E2F 100%); color: black; }
        .glass { background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(15px); border: 1px solid #333; transition: 0.3s; }
        .nav-tab { cursor: pointer; padding: 12px 20px; border-radius: 12px; transition: 0.3s; margin-bottom: 8px; border: 1px solid transparent; }
        .active-tab { background: #D4AF37; color: black; font-weight: bold; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }
        .sniper-alert { border-right: 4px solid #ff0000; background: rgba(255, 0, 0, 0.05); }
        
        /* Loading overlay styles */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.95); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; items-center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            border: 4px solid rgba(212, 175, 55, 0.3);
            border-top: 4px solid #D4AF37;
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="hidden text-center flex flex-col items-center justify-center">
        <div class="spinner mb-4 mx-auto"></div>
        <p class="text-[#D4AF37] font-bold tracking-widest text-lg animate-pulse">جاري تشفير الاتصال والاتصال بسيرفر Alpha...</p>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]">
        <div class="glass p-12 rounded-[40px] w-full max-w-md text-center shadow-2xl border-yellow-600/30 border relative overflow-hidden">
             <!-- Animated glow backrgound -->
            <div class="absolute -top-[50%] -left-[50%] w-[200%] h-[200%] bg-gradient-to-r from-transparent via-yellow-600/10 to-transparent -rotate-45 animate-[spin_10s_linear_infinite] pointer-events-none"></div>

            <h1 class="text-5xl font-bold mb-2 tracking-[0.2em] text-[#D4AF37] relative z-10">AIO</h1>
            <p class="text-gray-500 mb-10 uppercase text-xs tracking-[0.5em] relative z-10">Command Center</p>
            <div class="space-y-4 text-center relative z-10">
                <input type="text" id="username" placeholder="القائد (Alouch)" class="w-full p-4 rounded-2xl bg-black/80 border border-gray-800 text-white outline-none focus:border-[#D4AF37] text-center transition-all bg-opacity-80">
                <input type="password" id="password" placeholder="كلمة السر" class="w-full p-4 rounded-2xl bg-black/80 border border-gray-800 text-white outline-none focus:border-[#D4AF37] text-center transition-all bg-opacity-80">
                <button onclick="handleLogin()" class="w-full py-4 gold-gradient rounded-2xl font-bold text-xl hover:scale-95 transition shadow-[0_0_20px_rgba(212,175,55,0.3)] mt-4">تسجيل الدخول للنظام</button>
            </div>
             <p class="text-[10px] text-gray-600 mt-8 relative z-10">ALPHA ACCESS ONLY - ENCRYPTED CONNECTION</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
